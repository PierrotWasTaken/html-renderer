<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Web Engine</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #setup-ui {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 4rem 2rem;
            text-align: center;
            background-color: var(--surface);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .drop-zone.dragover {
            border-color: var(--accent);
            background-color: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .drop-zone svg {
            width: 48px;
            height: 48px;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .drop-zone h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .drop-zone p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        #file-input { display: none; }

        #progress-ui {
            display: none;
            background-color: var(--surface);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
            width: 100%;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background-color: var(--bg-color);
            border-radius: 4px;
            overflow: hidden;
            margin: 1.5rem 0 1rem;
            position: relative;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--accent);
            border-radius: 4px;
            transition: width 0.1s linear;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        #status-text {
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        #runner-container {
            display: none;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            background-color: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #fff;
            outline: none;
        }
    </style>
</head>
<body>

    <div id="setup-ui">
        <label class="drop-zone" id="drop-zone">
            <input type="file" id="file-input" multiple>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <h2>Drop files to run</h2>
            <p>Drag an HTML file here.<br><strong>WASM / JS support:</strong> Drop your HTML and `.wasm` files together.</p>
        </label>

        <div id="progress-ui">
            <div id="status-text">Parsing Engine...</div>
            <div class="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <div class="stats">
                <span id="percent-text">0%</span>
                <span id="time-text">Calculating...</span>
            </div>
        </div>
    </div>

    <div id="runner-container">
        <iframe id="output-frame" tabindex="0"
            allow="fullscreen; pointer-lock; autoplay; microphone; camera; display-capture; midi; xr-spatial-tracking" 
            allowfullscreen="true">
        </iframe>
    </div>

    <script>
        const setupUi = document.getElementById('setup-ui');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const progressUi = document.getElementById('progress-ui');
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');
        const percentText = document.getElementById('percent-text');
        const timeText = document.getElementById('time-text');
        const runnerContainer = document.getElementById('runner-container');
        const outputFrame = document.getElementById('output-frame');

        let activeWorker = null;
        let activeBlobUrls = [];

        const workerScript = `
            self.onmessage = async function(e) {
                const { file, mappings } = e.data;
                const totalBytes = file.size;
                try {
                    self.postMessage({ type: 'status', message: 'Reading file data...' });
                    const stream = file.stream();
                    const reader = stream.getReader();
                    let loadedBytes = 0;
                    const chunks = [];
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        chunks.push(value);
                        loadedBytes += value.length;
                        if (loadedBytes % (1024 * 256) < 65536) { 
                            self.postMessage({ type: 'progress', loaded: loadedBytes, total: totalBytes });
                        }
                    }
                    self.postMessage({ type: 'progress', loaded: totalBytes, total: totalBytes });
                    self.postMessage({ type: 'status', message: 'Linking WASM & Assets...' });
                    const blob = new Blob(chunks);
                    let text = await blob.text();
                    if (mappings && Object.keys(mappings).length > 0) {
                        for (const [filename, url] of Object.entries(mappings)) {
                            text = text.split(filename).join(url);
                        }
                    }
                    self.postMessage({ type: 'status', message: 'Booting engine...' });
                    const finalBlob = new Blob([text], { type: 'text/html;charset=utf-8' });
                    self.postMessage({ type: 'done', blob: finalBlob });
                } catch (err) {
                    self.postMessage({ type: 'error', error: err.message });
                }
            };
        `;

        function processFiles(files) {
            if (files.length === 0) return;
            let mainHtmlFile = null;
            const assets = [];
            for (const file of files) {
                if (file.name.endsWith('.html') || file.name.endsWith('.htm')) {
                    if (!mainHtmlFile || file.name === 'index.html') mainHtmlFile = file;
                } else {
                    assets.push(file);
                }
            }
            if (!mainHtmlFile) {
                alert("Please include at least one HTML file.");
                return;
            }

            dropZone.style.display = 'none';
            progressUi.style.display = 'block';
            let startTime = Date.now();

            const mappings = {};
            for (const asset of assets) {
                const url = URL.createObjectURL(asset);
                mappings[asset.name] = url;
                activeBlobUrls.push(url);
            }

            const workerBlob = new Blob([workerScript], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(workerBlob);
            activeWorker = new Worker(workerUrl);

            activeWorker.onmessage = function(e) {
                const data = e.data;
                if (data.type === 'status') statusText.textContent = data.message;
                else if (data.type === 'progress') {
                    const percent = Math.min(100, Math.round((data.loaded / data.total) * 100));
                    progressBar.style.width = percent + '%';
                    percentText.textContent = percent + '%';
                    const elapsed = Date.now() - startTime;
                    if (elapsed > 500 && data.loaded > 0) {
                        const speed = data.loaded / elapsed;
                        const remaining = (data.total - data.loaded) / speed;
                        timeText.textContent = (remaining / 1000).toFixed(1) + 's remaining';
                    }
                } 
                else if (data.type === 'done') {
                    activeWorker.terminate();
                    URL.revokeObjectURL(workerUrl);
                    const finalUrl = URL.createObjectURL(data.blob);
                    activeBlobUrls.push(finalUrl);
                    launchIframe(finalUrl);
                }
                else if (data.type === 'error') alert("Error processing file: " + data.error);
            };
            activeWorker.postMessage({ file: mainHtmlFile, mappings: mappings });
        }

        function launchIframe(url) {
            setupUi.style.display = 'none';
            runnerContainer.style.display = 'block';
            outputFrame.src = url;
            outputFrame.onload = () => {
                outputFrame.focus();
                if (outputFrame.contentWindow) outputFrame.contentWindow.focus();
            };
        }

        window.addEventListener('click', (e) => {
            if (runnerContainer.style.display === 'block') {
                outputFrame.focus();
                if (outputFrame.contentWindow) outputFrame.contentWindow.focus();
            }
        });

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            processFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => { processFiles(e.target.files); });
    </script>
</body>
</html>
